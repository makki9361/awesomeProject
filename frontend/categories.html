<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление категориями</title>
    <meta name="description" content="Управление категориями правил">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<header class="app-header">
    <div class="header-content">
        <div class="logo">
            <h1>Управление правилами</h1>
        </div>
        <nav class="nav-links">
            <a href="rules.html">Правила</a>
            <a href="categories.html" class="active">Категории</a>
            <a href="users.html" class="admin-only" style="display: none;">Пользователи</a>
        </nav>
        <div class="user-info">
            <span id="user-name" class="user-name-display"></span>
            <span id="user-role" class="user-role-badge"></span>
            <button onclick="logout()" class="logout-btn">Выйти</button>
        </div>
    </div>
</header>

<main class="main-container">
    <div class="categories-header">
        <h1>Управление категориями</h1>
        <button onclick="showCreateCategoryModal()" class="btn btn-primary">+ Создать категорию</button>
    </div>

    <div id="loading" class="loading-spinner" style="display: none;">Загрузка...</div>
    <div id="error" class="error-message" style="display: none;"></div>

    <div id="categories-list" class="categories-list"></div>
</main>

<div id="category-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Создание категории</h2>
            <button class="modal-close" onclick="closeCategoryModal()">&times;</button>
        </div>
        <form id="category-form" onsubmit="saveCategory(event)">
            <input type="hidden" id="category-id">
            <div class="form-group">
                <label for="category-name">Название категории *</label>
                <input type="text" id="category-name" required minlength="1" maxlength="100">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <button type="button" onclick="closeCategoryModal()" class="btn btn-secondary">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/categories.js"></script>
</body>
</html>
