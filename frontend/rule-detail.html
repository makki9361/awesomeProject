<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр правила</title>
    <meta name="description" content="Детальный просмотр правила">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<header class="app-header">
    <div class="header-content">
        <div class="logo">
            <h1>Управление правилами</h1>
        </div>
        <nav class="nav-links">
            <a href="rules.html">Правила</a>
            <a href="categories.html" class="admin-only" style="display: none;">Категории</a>
            <a href="users.html" class="admin-only" style="display: none;">Пользователи</a>
        </nav>
        <div class="user-info">
            <span id="user-name" class="user-name-display"></span>
            <span id="user-role" class="user-role-badge"></span>
            <button onclick="logout()" class="logout-btn">Выйти</button>
        </div>
    </div>
</header>

<main class="main-container">
    <div id="loading" class="loading-spinner" style="display: none;">Загрузка...</div>
    <div id="error" class="error-message" style="display: none;"></div>

    <article id="rule-content" class="rule-detail" style="display: none;">
        <div class="rule-header">
            <h1 id="rule-title"></h1>
            <div class="rule-meta-detail">
                <span class="rule-status" id="rule-status"></span>
                <span>Версия: <span id="rule-version"></span></span>
                <span>Категория: <span id="rule-category"></span></span>
                <span>Создано: <span id="rule-created-at"></span></span>
                <span>Обновлено: <span id="rule-updated-at"></span></span>
            </div>
        </div>

        <div class="rule-body">
            <h2>Содержание</h2>
            <div id="rule-content-text" class="rule-content-text"></div>
        </div>

        <div class="rule-actions" id="rule-actions" style="display: none;">
            <button onclick="publishRule()" id="publish-btn" class="btn btn-success">Опубликовать</button>
            <button onclick="editCurrentRule()" class="btn btn-secondary"><i class="fa fa-pen"></i></button>
            <button onclick="deleteCurrentRule()" class="btn btn-danger"><i class="fa fa-trash"></i></button>
        </div>

        <div class="back-link">
            <a href="rules.html">← Вернуться к списку правил</a>
        </div>
    </article>
</main>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/rule-detail.js"></script>
</body>
</html>
