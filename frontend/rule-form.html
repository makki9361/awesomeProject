<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Создание правила</title>
    <meta name="description" content="Создание и редактирование правил">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<header class="app-header">
    <div class="header-content">
        <div class="logo">
            <h1>Управление правилами</h1>
        </div>
        <nav class="nav-links">
            <a href="rules.html">Правила</a>
            <a href="categories.html" class="admin-only" style="display: none;">Категории</a>
            <a href="users.html" class="admin-only" style="display: none;">Пользователи</a>
        </nav>
        <div class="user-info">
            <span id="user-name" class="user-name-display"></span>
            <span id="user-role" class="user-role-badge"></span>
            <button onclick="logout()" class="logout-btn">Выйти</button>
        </div>
    </div>
</header>

<main class="main-container">
    <div class="form-container">
        <h1 id="form-title">Создание правила</h1>

        <div id="loading" class="loading-spinner" style="display: none;">Загрузка...</div>
        <div id="error" class="error-message" style="display: none;"></div>

        <form id="rule-form" onsubmit="saveRule(event)">
            <div class="form-group">
                <label for="title">Заголовок *</label>
                <input type="text" id="title" name="title" required minlength="1" maxlength="200">
                <small class="form-help">От 1 до 200 символов</small>
            </div>

            <div class="form-group">
                <label for="category_id">Категория *</label>
                <select id="category_id" name="category_id" required>
                    <option value="">Выберите категорию</option>
                </select>
            </div>

            <div class="form-group">
                <label for="status">Статус</label>
                <select id="status" name="status">
                    <option value="draft">Черновик</option>
                    <option value="published">Опубликовано</option>
                </select>
            </div>

            <div class="form-group">
                <label for="content">Содержание *</label>
                <textarea id="content" name="content" rows="10" required></textarea>
                <small class="form-help">Подробное описание правила</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <button type="button" onclick="cancel()" class="btn btn-secondary">Отмена</button>
            </div>
        </form>
    </div>
</main>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/rule-form.js"></script>
</body>
</html>
