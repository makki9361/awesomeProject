services:
  postgres:
    image: postgres:15-alpine

    container_name: awesomeProject_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: awesomeProject

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .

    container_name: awesomeProject_app

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: awesomeProject
      DB_SSL_MODE: disable
      SERVER_PORT: 8080

    restart: unless-stopped

volumes:
  postgres_data: